name: Preview Build
jobs:
  build-site:
    name: build preview
    runs-on: ubuntu-latest
    steps:
    - name: checkout
      uses: actions/checkout@master
    - name: Setup .NET SDKs
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          3.1.x
          5.0.x
          6.0.x
          7.0.x
          8.0.x
          9.0.x
          10.0.x
    - name: Setup Node.js
      uses: actions/setup-node@v1
      with:
        node-version: 18.x
    - name: Prepare AOT workload
      run: |
        dotnet workload install wasm-tools
    - name: build site
      id: site
      run: |
        npm install
        dotnet build
        sed -i s/{version}/$PACKAGE_VERSION/g ./site/AntDesign.Docs/Shared/HeaderMenu.razor
        dotnet publish ./site/AntDesign.Docs.Wasm -c Release -o _site
        cp -rf ./site/AntDesign.Docs.Wasm/bin/Debug/net10.0/*.dll _site/wwwroot/_framework
        find ./_site/wwwroot -type f -name '*.html' -exec bash -c 'if [ $(grep -o "<title>" "$1" | wc -l) -gt 1 ]; then perl -0777 -i -pe "s/<title>.*?<\/title>//s" "$1"; fi' _ {} \;
      env:
        PACKAGE_VERSION: ${{ github.event.number }}
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: Checking artifact directory contents"
        ls -R _site/wwwroot/ || echo "_site/wwwroot/ not found"
      continue-on-error: true
    - name: upload site artifact
      uses: actions/upload-artifact@v4
      with:
        name: site
        path: _site/wwwroot/
        retention-days: 5
    - name: Save PR number
      if: ${{ always() }}
      run: echo ${{ github.event.number }} > ./pr-id.txt
    - name: Upload PR number
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: pr
        path: ./pr-id.txt
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on: pull_request
