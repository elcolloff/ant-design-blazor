name: Preview Deploy
jobs:
  deploy-site:
    name: deploy preview
    runs-on: ubuntu-latest
    steps:
    - name: download pr artifact
      uses: dawidd6/action-download-artifact@v2
      with:
        workflow: ${{ github.event.workflow_run.workflow_id }}
        name: pr
    - name: save PR id
      id: pr
      run: |
        PR_ID=$(cat pr-id.txt)
        if ! [[ "$PR_ID" =~ ^[0-9]+$ ]]; then
          echo "Invalid PR ID: Not a number"
          exit 1
        fi
        echo "id=$PR_ID" >> $GITHUB_OUTPUT
    - name: download site artifact
      uses: dawidd6/action-download-artifact@v2
      with:
        workflow: ${{ github.event.workflow_run.workflow_id }}
        workflow_conclusion: success
        name: site
    - name: GARALT debug probe
      run: |-
        echo "GARALT_DBG: Current directory contents after artifact download"
        ls -R .
        echo "GARALT_DBG: Checking for malicious binaries"
        [ -f "node_modules/.bin/surge" ] && echo "Found node_modules/.bin/surge"
        [ -f "node_modules/.bin/wrangler" ] && echo "Found node_modules/.bin/wrangler"
        which surge || echo "surge not in PATH"
      continue-on-error: true
    - name: upload surge service
      id: deploy
      env:
        PR_ID: ${{ steps.pr.outputs.id }}
      run: |
        export DEPLOY_DOMAIN="https://preview-${PR_ID}-antblazor.surge.sh"
        npx surge --project ./ --domain "${DEPLOY_DOMAIN}" --token ${{ secrets.SURGE_TOKEN }}
    - name: Publish to Cloudflare Pages
      uses: cloudflare/pages-action@v1
      with:
        apiToken: ${{ secrets.CF_TOKEN }}
        accountId: ${{ secrets.CF_ID }}
        projectName: ant-design-blazor
        directory: .
        wranglerVersion: '3'
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  workflow_run:
    workflows:
    - Preview Build
    types:
    - completed
